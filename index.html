.stat.unm strong { color: #b8860b; }

.filters select { min-width: 90px; }

.row { display: flex; align-items: center; padding: 0.6rem 1rem; border-bottom: 1px solid #d8cfc4; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; gap: 0.7rem; background: #faf9f5; }
.row:nth-child(even) { background: #f3ede5; }
.row:hover { background: #e8dfcf; }
.row.selected { background: #e0d5c5; }
.row.match-type { border-left-color: #2e7d32; }
.row.tournament-type { border-left-color: #1565c0; }
.row.unmatched-type { border-left-color: #b8860b; }

.row .meta span { white-space: nowrap; }

.detail-header h3 { font-size: 1rem; color: #f6f3ec; }

.detail-body { padding: 1rem; }

.update-bar .status { display: flex; align-items: center; gap: 0.4rem; }
.update-bar .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

.dot.current { background: #2e7d32; }
.dot.changed { background: #c62828; }
.dot.error { background: #8a7e72; }

let selectedIdx = -1;
function applyFilters() {
  const q=document.getElementById("search").value.toLowerCase();
  const t=document.getElementById("typeF").value;
  const s=document.getElementById("sectionF").value;
  const sx=document.getElementById("sexF").value;
  const gym=document.getElementById("gymF").value;
  const filtered=DATA.filter(m=>{
    if(t&&m.type!==t) return false;
    if(s&&m.section!==s) return false;
    if(sx&&m.sex!==sx) return false;
    if(gym&&!m.fighters.some(f=>f.gym===gym)) return false;
    if(q){const h=m.fighters.map(f=>f.firstName+" "+f.lastName+" "+f.gym).join(" ").toLowerCase();if(!h.includes(q)) return false;}
    return true;
  });
  document.getElementById("count").textContent=filtered.length+" of "+DATA.length;
  renderTable(filtered);
}
function renderTable(items) {
  const col=document.getElementById("tableCol"); col.innerHTML="";
  let currentGroup="";
  const typeOrd={match:0,tournament:1,unmatched:2};
  items.sort((a,b)=>{
    if(a.section!==b.section) return a.section.localeCompare(b.section);
    if(a.sex!==b.sex) return a.sex==="Female"?-1:1;
    return (typeOrd[a.type]||3)-(typeOrd[b.type]||3);
  });
  items.forEach((m,i)=>{
    const gk=m.section+"|"+m.sex;
    if(gk!==currentGroup){
      currentGroup=gk;
      const h=document.createElement("div");h.className="section-header";
      h.textContent=m.section+" \u2014 "+m.sex;
      col.appendChild(h);
    }
    const row=document.createElement("div");
    row.className="row "+m.type+"-type";
    if(i===selectedIdx) row.classList.add("selected");
    row.onclick=()=>{selectedIdx=i;showDetail(m);applyFilters();};
    const badge=document.createElement("span");
    badge.className="badge "+(m.type==="match"?"b-match":m.type==="tournament"?"b-tourn":"b-unm");
    badge.textContent=m.type==="match"?"1v1":m.type==="tournament"?"T"+m.fighters.length:"?";
    row.appendChild(badge);
    const names=document.createElement("span");names.className="names";
    if(m.type==="match"){
      const f1=m.fighters[0],f2=m.fighters[1];
      names.innerHTML=esc(f1.firstName+" "+f1.lastName)+' <span class="vs">VS</span> '+esc(f2.firstName+" "+f2.lastName);
    } else if(m.type==="tournament"){
      names.textContent=m.fighters.map(f=>f.firstName+" "+f.lastName).join(", ");
    } else {
      names.innerHTML=esc(m.fighters[0].firstName+" "+m.fighters[0].lastName)+' <span class="waiting">\u2014 waiting</span>';
    }
    row.appendChild(names);
    const meta=document.createElement("span");meta.className="meta";
    meta.innerHTML="<span>"+esc(m.weight)+"</span><span>"+esc(m.sex==="Female"?"F":"M")+"</span>";
    row.appendChild(meta);
    col.appendChild(row);
  });
  if(!items.length) col.innerHTML='<div style="padding:2rem;text-align:center;color:#8a7e72">No matchups found</div>';
}
function esc(s){const d=document.createElement("span");d.textContent=s;return d.innerHTML;}
function showDetail(m){
  const panel=document.getElementById("detailCol"),body=document.getElementById("detailBody"),title=document.getElementById("detailTitle");
  panel.classList.add("open");
  if(m.type==="match"){
    title.textContent="Match \u2014 "+m.section+" "+m.weight;
    body.innerHTML=fighterCard(m.fighters[0])+'<div class="vs-divider">VS</div>'+fighterCard(m.fighters[1]);
  } else if(m.type==="tournament"){
    title.textContent="Tournament \u2014 "+m.section+" "+m.weight+" ("+m.fighters.length+" fighters)";
    body.innerHTML=m.fighters.map(f=>fighterCard(f)).join("");
  } else {
    title.textContent="Unmatched \u2014 "+m.section+" "+m.weight;
    body.innerHTML=fighterCard(m.fighters[0])+'<div class="info-note">Waiting for opponent</div>';
  }
}
function fighterCard(f){
  let c='<div class="fighter-card">';
  c+='<div class="fname">'+esc(f.firstName+" "+f.lastName)+'</div>';
  c+='<div class="fgym">'+esc(f.gym)+'</div>';
  c+='<dl class="fdetails">';
  c+='<dt>Age</dt><dd>'+esc(f.age||'-')+'</dd>';
  c+='<dt>Weight</dt><dd>'+esc(f.weight||'-')+'</dd>';
  c+='<dt>Class</dt><dd>'+esc(f["class"]||'-')+'</dd>';
  c+='<dt>Experience</dt><dd>'+esc(f.experience||'-')+'</dd>';
  c+='<dt>Country</dt><dd>'+esc(f.country||'-')+'</dd>';
  c+='</dl>';
  c+='<div class="frecord">';
  c+='<span class="w">W: '+esc(String(f.wins))+'</span>';
  c+='<span class="d">D: '+esc(String(f.draws))+'</span>';
  c+='<span class="l">L: '+esc(String(f.losses))+'</span>';
  c+='</div>';
  if(f.info){c+='<div class="info-note">'+esc(f.info)+'</div>';}
  c+='</div>';
  return c;
}
function closeDetail(){document.getElementById("detailCol").classList.remove("open");selectedIdx=-1;applyFilters();}

const BASELINE_LEN=22646;

async function simpleMD5(data){
  // Use SubtleCrypto SHA-256 as fingerprint (MD5 not available in browser, but we just need change detection)
  const buf=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function checkForUpdates(){
  const btn=document.getElementById("checkBtn");
  const status=document.getElementById("updateStatus");
  btn.disabled=true;
  status.innerHTML='<span class="dot checking"></span> Checking...';
  try{
    const parts=[];
    for(const url of CSV_URLS){
      const resp=await fetch(url);
      if(!resp.ok) throw new Error("HTTP "+resp.status);
      parts.push(await resp.arrayBuffer());
    }
    const totalLen=parts.reduce((s,p)=>s+p.byteLength,0);
    const combined=new Uint8Array(totalLen);
    let offset=0;
    for(const p of parts){combined.set(new Uint8Array(p),offset);offset+=p.byteLength;}
    const hash=await simpleMD5(combined);

    // Compare by length (reliable across platforms) + hash for extra confidence
    if(totalLen===BASELINE_LEN){
      status.innerHTML='<span class="dot current"></span> Data is up to date';
      const now=new Date();
      status.innerHTML+=' <span style="color:#8a7e72;font-size:0.75rem">(checked '+now.toLocaleTimeString()+')</span>';
    } else {
      const diff=totalLen-BASELINE_LEN;
      status.innerHTML='<span class="dot changed"></span> Sheet has been updated! ('+
        (diff>0?"+":"")+diff+' bytes) <a href="https://docs.google.com/spreadsheets/d/'+SHEET_ID+'" target="_blank" style="color:#1565c0;text-decoration:underline;font-size:0.8rem">Open sheet</a>';
    }
  }catch(e){
    status.innerHTML='<span class="dot error"></span> Could not check ('+esc(e.message)+')';
  }
  btn.disabled=false;
}

applyFilters();
</script>
</body>
</html>
